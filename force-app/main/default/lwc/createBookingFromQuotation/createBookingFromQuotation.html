<template>
    <template if:true={showButton}>
        <lightning-card title="Create Booking">
            <div class="slds-p-around_medium">
                <lightning-button
                    variant="brand"
                    label="Create Booking"
                    onclick={handleCreateBooking}
                ></lightning-button>
            </div>
        </lightning-card>
    </template>

    <template if:true={showBookingCreatedMessage}>
        <lightning-card title="Booking Status">
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_success" role="alert">
                    <span class="slds-assistive-text">success</span>
                    <h2>A Booking has already been created for this Quotation. Booking No: <a href={bookingUrl} target="_blank">{bookingName}</a></h2>
                </div>
            </div>
        </lightning-card>
    </template>
</template>
