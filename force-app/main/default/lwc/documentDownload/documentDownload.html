<template>
    <div>
        <h2>My Documents</h2>

        <template if:true={documents}>
            <template for:each={documents} for:item="doc">
                <div key={doc.downloadUrl}>
                    <a href={doc.downloadUrl} target="_blank">{doc.title}</a>
                </div>
            </template>
        </template>

        <template if:true={error}>
            <p>Error: {error}</p>
        </template>
    </div>
</template>
