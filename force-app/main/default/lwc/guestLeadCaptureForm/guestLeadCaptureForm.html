<template>
    <lightning-card title="Interested? Enquire Now">

        <div class="slds-p-around_medium">

            <template if:false={isSuccess}>

                <lightning-combobox
                    label="Salutation"
                    value={salutation}
                    options={salutationOptions}
                    onchange={handleSalutationChange}>
                </lightning-combobox>

                <lightning-input
                    type="text"
                    label="First Name"
                    value={firstName}
                    onchange={handleFirstNameChange}>
                </lightning-input>

                <lightning-input
                    type="text"
                    label="Last Name"
                    value={lastName}
                    required
                    onchange={handleLastNameChange}>
                </lightning-input>

                <lightning-input
                    type="tel"
                    label="Phone"
                    value={phone}
                    required
                    onchange={handlePhoneChange}>
                </lightning-input>

                <lightning-input
                    type="email"
                    label="Email"
                    value={email}
                    onchange={handleEmailChange}>
                </lightning-input>

                <lightning-textarea
                    label="Message"
                    value={message}
                    onchange={handleMessageChange}>
                </lightning-textarea>

                <template if:true={error}>
                    <div class="slds-text-color_error slds-m-top_small">
                        {error}
                    </div>
                </template>

                <div class="slds-m-top_medium">

                    <lightning-button
                        variant="brand"
                        label="Submit Enquiry"
                        onclick={handleSubmit}>
                    </lightning-button>

                </div>

            </template>

            <template if:true={isSuccess}>
                <div class="slds-text-heading_small slds-text-color_success">
                    ✅ Thank you! Our team will contact you shortly.
                </div>
                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="brand"
                        label="Close"
                        onclick={handleClose}>
                    </lightning-button>
                </div>
            </template>

        </div>

    </lightning-card>
</template>
