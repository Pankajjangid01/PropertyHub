<template>
    <div>
        <h2>My Payments</h2>

        <template if:true={payments}>
            <template for:each={payments} for:item="payment">
                <div key={payment.Id}>
                    <p>Booking: {payment.Booking__r.Name}</p>
                    <p>Amount: {payment.Amount__c}</p>
                    <p>Date: {payment.Payment_Date__c}</p>
                    <p>Status: {payment.Payment_Status__c}</p>
                    <p>Mode: {payment.Payment_Mode__c}</p>
                    <hr/>
                </div>
            </template>
        </template>

        <template if:true={error}>
            <p>Error: {error}</p>
        </template>
    </div>
</template>
