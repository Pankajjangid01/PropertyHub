<template>
    <section class="detail-page">
        <template if:true={property}>
            <div class="detail-grid">
                <!-- Left Column: Gallery -->
                <div class="gallery-column">
                    <div class="main-image-wrap">
                        <template if:true={activeImageUrl}>
                            <img src={activeImageUrl} alt={property.propertyName} class="main-image"/>
                        </template>
                        <template if:false={activeImageUrl}>
                            <div class="no-image">📸 Visual representation loading...</div>
                        </template>
                        <span class="status-badge">{property.status}</span>
                    </div>

                    <!-- Alternate Thumbnails -->
                    <template if:true={hasMultipleImages}>
                        <div class="thumbnails-grid">
                            <template for:each={imageUrls} for:item="img">
                                <div
                                    key={img.url}
                                    class={img.selectedClass}
                                    data-url={img.url}
                                    onclick={handleThumbnailClick}
                                >
                                    <img src={img.url} alt="Thumbnail"/>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Right Column: Info & Actions -->
                <div class="info-column">
                    <div class="info-card">
                        <p class="project-tag">🏢 {property.projectName}</p>
                        <h1 class="property-title">{property.propertyName}</h1>
                        <p class="property-price">{priceLabel}</p>

                        <div class="features-grid">
                            <div class="feature-item">
                                <span class="feature-icon">📐</span>
                                <span class="feature-val">{property.areaSqft} sqft</span>
                                <span class="feature-lbl">Property Area</span>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">🛏️</span>
                                <span class="feature-val">{property.bedrooms} BHK</span>
                                <span class="feature-lbl">Bedrooms</span>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">🏡</span>
                                <span class="feature-val">{property.propertyType}</span>
                                <span class="feature-lbl">Property Type</span>
                            </div>
                        </div>

                        <!-- Site Visit Request CTA for Authenticated Users -->
                        <template if:false={isGuestUser}>
                            <div class="action-panel">
                                <lightning-button
                                    class="site-visit-btn"
                                    variant="brand"
                                    label="Schedule Site Visit"
                                    onclick={handleOpenModal}
                                ></lightning-button>
                            </div>
                        </template>

                        <template if:true={isGuestUser}>
                            <div class="action-panel">
                                <lightning-button
                                    class="enquire-btn"
                                    variant="brand"
                                    label="Enquire Now"
                                    onclick={handleEnquireNow}
                                ></lightning-button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={error}>
            <div class="state-card error">
                <p>Unable to load property details: {error}</p>
            </div>
        </template>

        <!-- Site Visit Request Modal -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Schedule a Site Visit</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <c-site-visit-request-form record-id={recordId}></c-site-visit-request-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </section>
</template>
