<template>
    <div class="property-browse">
        <h2>Available Properties</h2>

        <template if:true={properties}>
            <template for:each={properties} for:item="prop">
                <div key={prop.propertyId} class="property-card" onclick={handleSelectProperty} data-id={prop.propertyId}>
                    <h3>{prop.propertyName}</h3>
                    <p>Type: {prop.propertyType}</p>
                    <p>Area: {prop.areaSqft} sqft</p>
                    <p>Price: {prop.price}</p>
                    <p>Status: {prop.status}</p>
                </div>
            </template>
        </template>

        <template if:true={error}>
            <p>Error loading properties: {error}</p>
        </template>

        <template if:true={selectedPropertyId}>
            <c-guest-lead-capture-form property-id={selectedPropertyId}></c-guest-lead-capture-form>
        </template>
    </div>
</template>
